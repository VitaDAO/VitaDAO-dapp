specVersion: 0.0.2
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum/contract
    name: Raphael
    network: {{network}}
    source:
      address: '{{raphael.address}}'
      abi: Raphael
      startBlock: {{raphael.startBlock}}
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.4
      language: wasm/assemblyscript
      entities:
        - Proposal
        - ProposalContent
        - Vote
        - Voter
      abis:
        - name: Raphael
          file: ./abis/Raphael.json
      eventHandlers:
        - event: ProposalCreated(uint256,string,uint256,uint256)
          handler: handleProposalCreated
        - event: ProposalStatusChanged(uint256,uint8)
          handler: handleProposalStatusChanged
        - event: Voted(address,uint256,uint256,bool)
          handler: handleVoted
        # - event: NativeTokenChanged(address,address,address)
        #   handler: handleNativeTokenChanged
        # - event: NativeTokenTransferred(address,address,uint256)
        #   handler: handleNativeTokenTransferred
        # - event: OwnershipTransferred(indexed address,indexed address)
        #   handler: handleOwnershipTransferred
        # - event: StakingAddressChanged(address,address,address)
        #   handler: handleStakingAddressChanged
        # - event: VotingDelayChanged(uint256)
        #   handler: handleVotingDelayChanged
        # - event: VotingDurationChanged(uint256)
        #   handler: handleVotingDurationChanged
      file: ./src/mapping.ts
  - kind: ethereum/contract
    name: Fractional
    network: {{network}}
    source:
      address: '{{fractional.address}}'
      abi: Fractional
      startBlock: {{fractional.startBlock}}
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.4
      language: wasm/assemblyscript
      entities:
        - FractionalVault
      abis:
        - name: Fractional
          file: ./abis/Fractional.json
      eventHandlers:
        - event: Mint(indexed address,uint256,uint256,address,uint256)
          handler: handleMint
      file: ./src/fractional/mapping.ts
  - kind: ethereum/contract
    name: NFT
    network: {{network}}
    source:
      address: '{{nft.address}}'
      abi: NFT
      startBlock: {{nft.startBlock}}
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.4
      language: wasm/assemblyscript
      entities:
        - IPNFT
        - Account
      abis:
        - name: NFT
          file: ./abis/NFT.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,indexed uint256)
          handler: handleTransfer
        - event: TokenURLUpdated(uint256,string)
          handler: handleTokenURLUpdated
      file: ./src/nft/mapping.ts
