specVersion: 0.0.2
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum/contract
    name: Raphael
    network: {{network}}
    source:
      address: '{{addressRaphaelContract}}'
      abi: Raphael
      startBlock: {{startBlockRaphael}}
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.4
      language: wasm/assemblyscript
      entities:
        - Proposal
        - ProposalContent
        - Vote
        - Voter
      abis:
        - name: Raphael
          file: ./abis/Raphael.json
        - name: ENSReverseRecords
          file: ./abis/ENSReverseRecords.json
      eventHandlers:
        - event: ProposalCreated(uint256,string,uint256,uint256)
          handler: handleProposalCreated
        - event: ProposalStatusChanged(uint256,uint8)
          handler: handleProposalStatusChanged
        - event: Voted(address,uint256,uint256,bool)
          handler: handleVoted
        # - event: NativeTokenChanged(address,address,address)
        #   handler: handleNativeTokenChanged
        # - event: NativeTokenTransferred(address,address,uint256)
        #   handler: handleNativeTokenTransferred
        # - event: OwnershipTransferred(indexed address,indexed address)
        #   handler: handleOwnershipTransferred
        # - event: StakingAddressChanged(address,address,address)
        #   handler: handleStakingAddressChanged
        # - event: VotingDelayChanged(uint256)
        #   handler: handleVotingDelayChanged
        # - event: VotingDurationChanged(uint256)
        #   handler: handleVotingDurationChanged
      file: ./src/mapping.ts
- kind: ethereum/contract
    name: Factory
    network: {{network}}
    source:
      address: '{{addressUniswapV3FactoryContract}}'
      abi: Factory
      startBlock: {{startBlockUniswapV3Factory}}
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.4
      language: wasm/assemblyscript
      file: ./src/factory.ts
      entities:
        - Pool
        - Token
      abis:
        - name: Factory
          file: ./abis/factory.json
        - name: ERC20
          file: ./abis/ERC20.json
        - name: ERC20SymbolBytes
          file: ./abis/ERC20SymbolBytes.json
        - name: ERC20NameBytes
          file: ./abis/ERC20NameBytes.json
        - name: Pool
          file: ./abis/pool.json
      eventHandlers:
        - event: PoolCreated(indexed address,indexed address,indexed uint24,int24,address)
          handler: handlePoolCreated
templates:
  - kind: ethereum/contract
    name: Pool
    network: {{network}}
    source:
      abi: Pool
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.4
      language: wasm/assemblyscript
      file: ./src/mapping.ts
      entities:
        - Pool
        - Token
      abis:
        - name: Pool
          file: ./abis/pool.json
        - name: Factory
          file: ./abis/factory.json
        - name: ERC20
          file: ./abis/ERC20.json
      eventHandlers:
        - event: Initialize(uint160,int24)
          handler: handleInitialize
        - event: Swap(indexed address,indexed address,int256,int256,uint160,uint128,int24)
          handler: handleSwap
